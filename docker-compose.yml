version: '3.8'

services:
  clawscope:
    build: .
    image: clawscope:latest
    container_name: clawscope
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - clawscope-data:/root/.clawscope
    restart: unless-stopped
    networks:
      - clawscope-net

  # 可选: Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: clawscope-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - clawscope
    restart: unless-stopped
    networks:
      - clawscope-net
    profiles:
      - with-nginx

  # 可选: Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: clawscope-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - clawscope-net
    profiles:
      - with-qdrant

  # 可选: Redis 缓存
  redis:
    image: redis:alpine
    container_name: clawscope-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - clawscope-net
    profiles:
      - with-redis

volumes:
  clawscope-data:
  qdrant-data:
  redis-data:

networks:
  clawscope-net:
    driver: bridge
